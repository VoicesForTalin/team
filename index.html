<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM TLG</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:'Cormorant Garamond',serif;
}

.hero{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

.hero img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(
circle,
rgba(0,0,0,0) 40%,
rgba(0,0,0,.55) 100%
),
linear-gradient(
to top,
rgba(0,0,0,.85),
rgba(0,0,0,.25),
rgba(0,0,0,.05)
);
}

.content{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
text-align:center;
color:white;
padding:0 20px 120px;
}

.content h1{
font-size:90px;
font-weight:600;
letter-spacing:4px;
line-height:1;
margin-bottom:15px;
white-space:nowrap;
text-shadow:0 8px 25px rgba(0,0,0,.35);
}

.content h2{
font-size:20px;
font-weight:400;
letter-spacing:3px;
margin-bottom:20px;
}

.content p{
font-size:18px;
line-height:1.8;
max-width:650px;
margin-bottom:35px;
}

.enter-btn{
display:inline-block;
padding:18px 80px;
border-radius:60px;
text-decoration:none;
color:white;
font-size:18px;
letter-spacing:5px;

border:1px solid rgba(255,255,255,.7);

background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);

box-shadow:
0 10px 30px rgba(0,0,0,.4),
0 0 20px rgba(255,255,255,.15);

transition:all .4s ease;
}

.enter-btn:hover{
transform:translateY(-4px) scale(1.05);
background:white;
color:black;
box-shadow:0 15px 40px rgba(255,255,255,.35);
}

@media(max-width:768px){

.content{
padding-bottom:100px;
}

.content h1{
font-size:72px;
}

.content h2{
font-size:14px;
letter-spacing:2px;
}

.content p{
font-size:14px;
}

.enter-btn{
padding:16px 60px;
font-size:15px;
}
}

</style>
</head>

<body>

<section class="hero">

<img src="IMG_0512.jpeg" alt="TEAM TLG">

<div class="content">

<h1>TEAM TLG</h1>

<h2>FAN VOICES FOR TALIN'S BIRTHDAY</h2>

<p>
A special collection of birthday wishes from fans around the world.
</p>

<a href="voices.html" class="enter-btn">
ENTER
</a>

</div>

</section>

</body>
</html>
